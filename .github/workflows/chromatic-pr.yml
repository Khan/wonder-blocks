name: Chromatic - Pull Request

on:
    pull_request:
        # This allows us to run the workflow on PRs from when they move from draft
        # to non-draft.
        types: [edited, opened, synchronize, reopened]

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    chromatic_changesets:
        # Only run this workflow when the Release PR is opened/created.
        if: startsWith(github.head_ref, 'changeset-release/')
        name: Chromatic - Skip on Release PR (changesets)
        uses: ./.github/workflows/chromatic-build.yml
        with:
            target: "bot"
        secrets:
            projectToken: ${{ secrets.CHROMATIC_APP_CODE }}

    # ------- Regular PRs --------
    chromatic_review:
        # (if) Run this step on regular PRs.
        if: |
            github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]' &&
            !startsWith(github.head_ref, 'changeset-release/')
        name: Build on regular PRs
        uses: ./.github/workflows/chromatic-build.yml
        with:
            target: "review"
        secrets:
            projectToken: ${{ secrets.CHROMATIC_APP_CODE }}

    chromatic_review_results:
        # (if) Run this step on regular PRs.
        if: |
            github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]' &&
            !startsWith(github.head_ref, 'changeset-release/')
        name: Get results on regular PRs
        needs: chromatic_review
        runs-on: ${{ vars.USE_GITHUB_RUNNERS == 'true' && 'ubuntu-latest' || 'ephemeral-runner' }}
        strategy:
            fail-fast: false
            matrix:
                node-version: [24.x]
        steps:
            # Create/update PR comment with Chromatic results
            - name: Find existing comment
              uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
              id: fc
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-author: "github-actions[bot]"
                  body-includes: A new build was pushed to Chromatic!

            - name: Create or update comment
              uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
              with:
                  comment-id: ${{ steps.fc.outputs.comment-id }}
                  edit-mode: replace
                  issue-number: ${{ github.event.pull_request.number }}
                  body: |
                      # A new build was pushed to Chromatic! :rocket:
                      ${{ needs.chromatic_review.outputs.storybookUrl }}

                      ## Chromatic results:

                      | Metric | Total |
                      |---|---|
                      | Captured snapshots | ${{ needs.chromatic_review.outputs.actualCaptureCount }} |
                      | Tests with visual changes | ${{ needs.chromatic_review.outputs.changeCount }} |
                      | Total stories | ${{ needs.chromatic_review.outputs.specCount }} |
                      | Inherited (not captured) snapshots [TurboSnap] | ${{ needs.chromatic_review.outputs.inheritedCaptureCount }} |
                      | Tests on the build | ${{ needs.chromatic_review.outputs.testCount }} |

    storybook_tests:
        # (if) Run this step on regular PRs.
        if: |
            github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]' &&
            !startsWith(github.head_ref, 'changeset-release/')
        name: Run Storybook tests
        needs: chromatic_review
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
        steps:
            - name: Checking out latest commit
              uses: actions/checkout@v5
            - name: Secure Network
              uses: Khan/actions@secure-network-v1
              timeout-minutes: 5

            - name: Use Node.js 24.x
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x

            # Cache and install dependencies
            # Runs before Secure Network so npm registry access is unrestricted.
            - name: Install & cache node_modules
              uses: ./.github/actions/shared-node-cache
              timeout-minutes: 5
              with:
                  node-version: 24.x

            # Use the pre-installed Chrome on the runner instead of downloading
            # Playwright's Chromium. Downloading via playwright install takes
            # 2-6 h from these runners regardless of which CDN is used, making
            # CI unusable. ubuntu-latest always ships google-chrome-stable;
            # setting PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH tells Playwright to
            # use it instead of looking in ~/.cache/ms-playwright.
            - name: Set Playwright to use system Chrome
              run: |
                  CHROME=$(which google-chrome-stable || which google-chrome || which chromium-browser || echo "")
                  if [ -z "$CHROME" ]; then
                    echo "No system Chrome/Chromium found on this runner" >&2
                    exit 1
                  fi
                  echo "Found system browser: $CHROME ($($CHROME --version))"
                  echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=$CHROME" >> $GITHUB_ENV

            - name: Install Playwright system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y fonts-liberation fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf fonts-freefont-ttf
                  pnpm exec playwright install-deps chromium

            - name: Secure Network
              uses: Khan/actions@secure-network-v1
              timeout-minutes: 5
              with:
                  # chromatic.com: Chromatic-hosted Storybook URL loaded by
                  # Playwright during test:storybook. All install-time domains
                  # (npm registry, apt mirrors, Playwright CDN) are handled
                  # before this step and no longer need to be listed here.
                  extra-domains: chromatic.com

            # Build the project
            - name: Generate WB build artifacts
              run: pnpm build

            - name: Run Storybook tests
              run: pnpm test:storybook
              timeout-minutes: 15
              env:
                  SB_URL: "${{ needs.chromatic_review.outputs.storybookUrl }}"
