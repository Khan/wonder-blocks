<style>
    /*
     * Cascade-layer order for Wonder Blocks.
     *
     * Earlier layers lose to later ones, so authoring order is also
     * priority order. Anything unlayered wins over everything below.
     *
     *   reset  — future normalize / reset rules
     *   shared — every Wonder Blocks component (CSS Modules output is
     *            wrapped in @layer shared by the build pipeline)
     *   legacy — consumer-owned escape hatch for legacy styles that need
     *            to win over Wonder Blocks defaults
     */
    @layer reset, shared, legacy;

    body {
        font-family: "Lato", sans-serif;
        font-size: 1.6rem!important;
    }

    /* Overrides the ArgTypes table tabs to avoid some z-index issues with
    components that rely on PopperJS (specially Dropdown) */
    .os-padding {
        z-index: initial !important;
    }
</style>
